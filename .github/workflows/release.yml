name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload unversioned installer for latest-download redirect
        shell: pwsh
        run: |
          $versioned = Get-ChildItem dist\*.exe | Where-Object { $_.Name -notlike '*.blockmap' } | Select-Object -First 1
          Copy-Item $versioned.FullName dist\QuickMark-Setup.exe
          gh release upload $env:GITHUB_REF_NAME dist\QuickMark-Setup.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
